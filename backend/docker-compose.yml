version: "3.9"

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      INTENT_SERVICE_HOST: intent-service
      INTENT_SERVICE_PORT: 50051
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gpt-oss:20b
    depends_on:
      - intent-service
      - ollama

  intent-service:
    build:
      context: ../intent_service
      dockerfile: Dockerfile
    ports:
      - "50051:50051"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
